<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notez | Contato</title>
  <link rel="stylesheet" href="./../css/style.css">
  <link rel="stylesheet" href="../css/contato.css">
</head>
<body>

  <header>
    <div class="menu">
      <nav class="menuNav">
        <a href="./../../index.html" class="logo"><img src="/src/img/atom-logo.png" alt=""></a>
        <ul class="menuNav-list">
          <li><a href="./../../index.html" class="menuNav-item">Home</a></li>
          <li><a href="./detalhes.html" class="menuNav-item">Detalhes</a></li>
          <li><a href="./sobre.html" class="menuNav-item">Sobre nós</a></li>
          <li><a href="#" class="menuNav-item ativo">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="contato-container">
    <div class="contato-card">
      <h2>Entre em contato</h2>
      <p>Alguma dúvida ou sugestão? Então, por favor, envie uma mensagem para gente! A Atom agradece.</p>
      
      <form action="#" method="POST" class="contato-form">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
        </div>

        <div class="form-group">
          <label for="assunto">Assunto</label>
          <input type="text" id="assunto" name="assunto" placeholder="Qual o motivo do contato?" required>
        </div>

        <div class="form-group">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem aqui..." required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar Mensagem</button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2026 Atom. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
